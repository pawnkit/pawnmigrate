version: 2

project_name: pawnmigrate

builds:
  - id: pawnmigrate
    main: ./cmd/pawnmigrate
    binary: pawnmigrate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

changelog:
  use: git
  sort: asc
